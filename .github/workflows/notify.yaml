name: Notificar Update

on:
  push

jobs:
  notify-servidor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Disparar Evento
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_DISPATCH }}
          repository: koitech-aero/Servidor
          event-type: update_submodule

  notify-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Disparar Evento
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_DISPATCH }}
          repository: koitech-aero/FrontEnd
          event-type: update_submodule

  notify-perfil:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Disparar Evento
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_DISPATCH }}
          repository: koitech-aero/.github
          event-type: update_submodule